name: Version Tag and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version to create, for example 0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm run lint

      - name: Run checks
        run: pnpm run check

      - name: Build project
        run: pnpm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update version in package.json
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Commit and push tag
        run: |
          git add package.json pnpm-lock.yaml
          git commit -m "chore: release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD --follow-tags

      - name: Create GitHub Release & Auto-Changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The --generate-notes flag natively generates a changelog based on
        # PRs and commits merged since your previous tag.
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "Release v${{ inputs.version }}" \
            --generate-notes \
            --latest
